<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa-Museo Maravillas</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#061D39;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* CABECERA */
.top-bar{
  height:60px;
  background:#EBEBEB;
  color:#061D39;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  font-weight:bold;
  position:relative;
}

.menu-button{
  position:absolute;
  right:20px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.menu-line{
  width:22px;
  height:2px;
  background:#061D39;
}

.menu-panel{
  position:absolute;
  top:60px;
  right:20px;
  background:#EBEBEB;
  color:#061D39;
  display:none;
  flex-direction:column;
  padding:10px;
  border-radius:6px;
  gap:8px;
}

.menu-panel.active{
  display:flex;
}

/* SALA */
.main{
  flex:1;
  background:#061D39;
}

#threeCanvas{
  width:100%;
  height:100%;
  display:block;
}

/* BARRA INFERIOR */
.bottom-bar{
  background:#EBEBEB;
  padding:20px;
  min-height:150px;
}

.bottom-bar h2{
  color:#061D39;
  margin-bottom:15px;
}

.bottom-content{
  display:flex;
  gap:30px;
  align-items:center;
  flex-wrap:wrap;
}

/* BUSCADOR */
.search-block{
  display:flex;
  gap:10px;
}

.code-input{
  padding:10px;
  border:1px solid #A2A2A2;
  border-radius:6px;
}

.button{
  padding:10px 15px;
  border:none;
  background:#8F95A5;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.button:hover{
  background:#061D39;
}

/* VISOR */
.object-viewer{
  width:170px;
  height:120px;
  background:#061D39;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:6px;
}

/* DATOS */
.object-data{
  display:flex;
  gap:20px;
  color:#061D39;
  flex-wrap:wrap;
}

/* FOOTER */
.footer{
  height:25px;
  background:#061D39;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
}
</style>
</head>

<body>

<!-- CABECERA -->
<div class="top-bar">
  Casa-Museo Maravillas

  <div class="menu-button" id="menuButton">
    <div class="menu-line"></div>
    <div class="menu-line"></div>
    <div class="menu-line"></div>
  </div>

  <div class="menu-panel" id="menuPanel">
    <div>Visión humedad relativa</div>
    <div>Temperatura</div>
    <div>Piezas en riesgo</div>
    <div>Selección tipología</div>
  </div>
</div>

<!-- SALA -->
<div class="main">
  <canvas id="threeCanvas"></canvas>
</div>

<!-- BARRA INFERIOR -->
<div class="bottom-bar">
  <h2>Sala: Salón de Estudio</h2>

  <div class="bottom-content">

    <div class="search-block">
      <input type="text" id="codeInput" class="code-input" placeholder="Introduce código">
      <button id="searchButton" class="button">Buscar</button>
    </div>

    <div class="object-viewer">
      Visor 3D
    </div>

    <div id="objectInfo" class="object-data"></div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © Ana Braojos Martorell
</div>

<script>
const piezas = {
  "1089": {
    nombre:"Cuadro 1",
    tipologia:"Pintura",
    materiales:"Lienzo",
    dimensiones:"150 x 120 cm",
    fecha:"Siglo XVII",
    autor:"Zurbarán"
  },

  "1263": {
    nombre:"Escultura 1",
    tipologia:"Escultura",
    materiales:"Bronce",
    dimensiones:"80 cm",
    fecha:"Siglo XIX",
    autor:"Bien institución"
  }
};

/* MENÚ */
const menuButton = document.getElementById("menuButton");
const menuPanel = document.getElementById("menuPanel");

menuButton.addEventListener("click", () => {
  menuPanel.classList.toggle("active");
});

/* BUSCADOR */
const searchButton = document.getElementById("searchButton");
const codeInput = document.getElementById("codeInput");
const objectInfo = document.getElementById("objectInfo");

function buscarPieza(){
  const code = codeInput.value.trim();
  const pieza = piezas[code];

  if(pieza){
    objectInfo.innerHTML = `
      <span><strong>Nombre:</strong> ${pieza.nombre}</span>
      <span><strong>Tipología:</strong> ${pieza.tipologia}</span>
      <span><strong>Material:</strong> ${pieza.materiales}</span>
      <span><strong>Dimensiones:</strong> ${pieza.dimensiones}</span>
      <span><strong>Fecha:</strong> ${pieza.fecha}</span>
      <span><strong>Autor:</strong> ${pieza.autor}</span>
    `;
  } else {
    objectInfo.innerHTML = `<span>Código no encontrado</span>`;
  }
}

searchButton.addEventListener("click", buscarPieza);

codeInput.addEventListener("keypress", function(e){
  if(e.key==="Enter"){
    buscarPieza();
  }
});
</script>

</body>
</html>
