<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa-Museo Maravillas</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Roboto',sans-serif;
background:#061D39;
color:#EBEBEB;
height:100vh;
display:flex;
flex-direction:column;
}

/* CABECERA */

.top-bar{
height:60px;
background:#EBEBEB;
color:#061D39;
display:flex;
justify-content:center;
align-items:center;
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
}

/* ZONA SALA */

.main{
flex:1;
background:#061D39;
}

canvas{
width:100%;
height:100%;
display:block;
}

/* BARRA INFERIOR */

.bottom-bar{
background:#EBEBEB;
padding:18px 30px;
display:flex;
flex-direction:column;
gap:12px;
}

.bottom-bar h2{
color:#061D39;
font-size:20px;
}

/* CONTENIDO HORIZONTAL */

.bottom-content{
display:flex;
align-items:center;
gap:40px;
}

/* BUSCADOR */

.search-block{
display:flex;
gap:10px;
}

.code-input{
font-family:'Fira Code',monospace;
padding:10px;
border:1px solid #A2A2A2;
border-radius:8px;
background:#EBEBEB;
color:#061D39;
}

.button{
padding:10px 16px;
background:#8F95A5;
color:#EBEBEB;
border:none;
border-radius:8px;
cursor:pointer;
}

.button:hover{
background:#A2A2A2;
}

/* VISOR */

.object-viewer{
width:170px;
height:120px;
border:1px solid #A2A2A2;
border-radius:6px;
background:#061D39;
position:relative;
}

#objectCanvas{
width:100%;
height:100%;
}

.viewer-placeholder{
position:absolute;
bottom:5px;
left:8px;
font-size:11px;
opacity:0.6;
}

/* DATOS */

.object-data{
display:flex;
gap:25px;
color:#061D39;
font-size:14px;
}

/* FOOTER */

.footer{
height:22px;
background:#061D39;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
}

</style>
</head>

<body>

<div class="top-bar">
Casa-Museo Maravillas
</div>

<div class="main">
<canvas id="threeCanvas"></canvas>
</div>

<div class="bottom-bar">

<h2>Sala: Salón de Estudio</h2>

<div class="bottom-content">

<div class="search-block">
<input class="code-input" placeholder="Introduce el código" id="codeInput">
<button class="button" id="searchButton">Buscar</button>
</div>

<div class="object-viewer">
<canvas id="objectCanvas"></canvas>
<div class="viewer-placeholder">Visor 3D</div>
</div>

<div class="object-data" id="objectInfo">
<span><strong>Nombre:</strong></span>
<span><strong>Material:</strong></span>
<span><strong>Dimensiones:</strong></span>
<span><strong>Fecha:</strong></span>
<span><strong>Autor:</strong></span>
</div>

</div>

</div>

<div class="footer">
© Ana Braojos Martorell
</div>

<script>

const searchButton=document.getElementById("searchButton");
const codeInput=document.getElementById("codeInput");
const objectInfo=document.getElementById("objectInfo");

searchButton.addEventListener("click",()=>{

const code=codeInput.value.trim();

if(code==="5"){

objectInfo.innerHTML=`
<span><strong>Nombre:</strong> Ana</span>
<span><strong>Material:</strong> Chicle</span>
<span><strong>Dimensiones:</strong> 6 metros</span>
<span><strong>Fecha:</strong> 2000</span>
<span><strong>Autor:</strong> Narnia</span>
`;

}else{

objectInfo.innerHTML=`
<span><strong>Nombre:</strong></span>
<span><strong>Material:</strong></span>
<span><strong>Dimensiones:</strong></span>
<span><strong>Fecha:</strong></span>
<span><strong>Autor:</strong></span>
`;

}

});

</script>

</body>
</html>
