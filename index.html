<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa-Museo Maravillas</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Roboto',sans-serif;
  background:#061D39;
  color:#EBEBEB;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* CABECERA */
.top-bar {
  height:60px;
  background:#EBEBEB;
  color:#061D39;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:700;
  position:relative;
}

.menu-button {
  position:absolute;
  right:25px;
  top:18px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.menu-line {
  width:22px;
  height:2px;
  background:#061D39;
}

/* MENU DESPLEGABLE */
.menu-panel {
  position:absolute;
  top:60px;
  right:20px;
  background:#EBEBEB;
  color:#061D39;
  border-radius:6px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  padding:12px;
  display:none;
  flex-direction:column;
  gap:10px;
  font-size:14px;
  min-width:190px;
  z-index:1000;
}

.menu-panel div {
  cursor:pointer;
  padding:5px 8px;
  border-radius:4px;
  transition:background 0.2s;
}

.menu-panel div:hover {
  background:#A2A2A2;
  color:#fff;
}

.menu-panel.active {
  display:flex;
}

/* SALA */
.main {
  flex:1;
  background:#061D39;
  display:flex;
  min-height:0;
}

#threeCanvas {
  flex:1;
  width:100%;
  height:100%;
  display:block;
}

/* BARRA INFERIOR */
.bottom-bar {
  background:#EBEBEB;
  padding:18px 30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.bottom-bar h2 {
  color:#061D39;
  font-size:20px;
}

.bottom-content {
  display:flex;
  align-items:center;
  gap:40px;
}

.search-block {
  display:flex;
  gap:10px;
}

.code-input {
  font-family:'Fira Code',monospace;
  padding:10px;
  border:1px solid #A2A2A2;
  border-radius:8px;
  background:#EBEBEB;
  color:#061D39;
  transition:all 0.2s;
}

.code-input:focus {
  border-color:#8F95A5;
  box-shadow:0 0 6px #8F95A5;
}

.button {
  padding:10px 16px;
  background:#8F95A5;
  color:#EBEBEB;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
}

.button:hover {
  background:#061D39;
}

/* VISOR */
.object-viewer {
  width:170px;
  height:120px;
  border:1px solid #A2A2A2;
  border-radius:6px;
  background:#061D39;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  opacity:0.6;
}

/* DATOS */
.object-data {
  display:flex;
  gap:25px;
  color:#061D39;
  font-size:14px;
  flex-wrap:wrap;
}

.footer {
  height:22px;
  background:#061D39
