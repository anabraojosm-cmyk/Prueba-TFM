<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa-Museo Maravillas</title>

<!-- Fuentes elegantes -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #061D39;
    color: #EBEBEB;
  }

  .container {
    display: flex;
    height: calc(100vh - 60px); /* barra superior + footer */
    overflow: hidden;
  }

  /* Barra superior */
  .top-bar {
    width: 100%;
    height: 60px;
    background-color: #EBEBEB;
    color: #061D39;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 24px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  /* Área principal izquierda */
  .main {
    flex: 1;
    background-color: #061D39;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Sidebar derecha vertical */
  .sidebar {
    width: 350px;
    display: flex;
    flex-direction: column;
  }

  /* Panel de info azul */
  .info-panel {
    flex: 1;
    background-color: #061D39;
    color: #EBEBEB;
    padding: 20px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Barra inferior blanca que ocupa toda la parte inferior derecha */
  .bottom-bar {
    background-color: #EBEBEB;
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    box-shadow: -2px -2px 10px rgba(0,0,0,0.2);
    gap: 10px;
  }

  /* Título de la sala en barra inferior */
  .bottom-bar h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #061D39;
    white-space: nowrap;
  }

  .bottom-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
  }

  /* Parte izquierda: búsqueda */
  .bottom-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .code-input {
    font-family: 'Fira Code', monospace;
    padding: 10px;
    border: 1px solid #A2A2A2;
    border-radius: 8px;
    outline: none;
    background-color: #EBEBEB;
    color: #061D39;
  }

  .code-input:focus {
    border-color: #8F95A5;
    box-shadow: 0 0 5px #8F95A5;
  }

  .button {
    padding: 10px 15px;
    background-color: #8F95A5;
    color: #EBEBEB;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.3s, transform 0.2s;
  }

  .button:hover {
    background-color: #A2A2A2;
    transform: translateY(-2px);
  }

  /* Parte derecha: campos info */
  .bottom-right {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 14px;
    color: #061D39;
  }

  .bottom-right span {
    display: block;
  }

  /* Footer */
  .footer {
    width: 100%;
    height: 20px;
    background-color: #061D39;
    color: #EBEBEB;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

</style>
</head>
<body>

  <!-- Barra superior -->
  <div class="top-bar">Casa-Museo Maravillas</div>

  <!-- Contenedor principal -->
  <div class="container">
    <!-- Área principal 3D -->
    <div class="main">
      <canvas id="threeCanvas"></canvas>
    </div>

    <!-- Sidebar derecha -->
    <div class="sidebar">
      <!-- Panel azul de info arriba -->
      <div class="info-panel" id="infoPanel">
        <!-- Información adicional o logs -->
      </div>

      <!-- Barra inferior blanca -->
      <div class="bottom-bar">
        <h2>Sala: Salón de Estudio</h2>
        <div class="bottom-content">
          <div class="bottom-left">
            <input class="code-input" placeholder="Introduce el código" id="codeInput"/>
            <button class="button" id="searchButton">Buscar</button>
          </div>
          <div class="bottom-right" id="objectInfo">
            <span><strong>Nombre:</strong> </span>
            <span><strong>Material:</strong> </span>
            <span><strong>Dimensiones:</strong> </span>
            <span><strong>Fecha:</strong> </span>
            <span><strong>Autor:</strong> </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">© Ana Braojos Martorell</div>

  <!-- JS -->
  <script>
    const searchButton = document.getElementById('searchButton');
    const codeInput = document.getElementById('codeInput');
    const objectInfo = document.getElementById('objectInfo');

    searchButton.addEventListener('click', () => {
      const code = codeInput.value.trim();
      if(code) {
        objectInfo.innerHTML = `
          <span><strong>Nombre:</strong> Obra ${code}</span>
          <span><strong>Material:</strong> Madera</span>
          <span><strong>Dimensiones:</strong> 50x100x30 cm</span>
          <span><strong>Fecha:</strong> 2026</span>
          <span><strong>Autor:</strong> Ana Braojos Martorell</span>
        `;
      }
    });
  </script>

</body>
</html>
