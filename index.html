<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala Expositiva 3D</title>

<!-- Fuentes elegantes -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #061D39;
    color: #EBEBEB;
  }

  .container {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Área principal izquierda */
  .main {
    flex: 1;
    background-color: #061D39;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Sidebar derecha vertical */
  .sidebar {
    width: 300px;
    display: flex;
    flex-direction: column;
  }

  /* Panel superior de info (azul) */
  .info-panel {
    flex: 1;
    background-color: #061D39; /* azul oscuro elegante */
    color: #EBEBEB;
    padding: 20px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Barra inferior (blanca) */
  .bottom-bar {
    padding: 15px;
    background-color: #EBEBEB; /* blanco */
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: -2px -2px 10px rgba(0,0,0,0.2);
  }

  .bottom-bar h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #061D39;
  }

  .code-input {
    font-family: 'Fira Code', monospace;
    padding: 10px;
    border: 1px solid #A2A2A2;
    border-radius: 8px;
    outline: none;
    background-color: #EBEBEB;
    color: #061D39;
  }

  .code-input:focus {
    border-color: #8F95A5;
    box-shadow: 0 0 5px #8F95A5;
  }

  .button {
    padding: 10px;
    background-color: #8F95A5;
    color: #EBEBEB;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.3s, transform 0.2s;
  }

  .button:hover {
    background-color: #A2A2A2;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Área principal 3D -->
    <div class="main">
      <canvas id="threeCanvas"></canvas>
    </div>

    <!-- Sidebar derecha -->
    <div class="sidebar">
      <!-- Panel superior de info (azul) -->
      <div class="info-panel" id="infoPanel">
        <!-- Aquí aparecerá la información de los objetos -->
      </div>

      <!-- Barra inferior (blanca) con título, input y botón -->
      <div class="bottom-bar">
        <h2>Sala: Salón de Estudio</h2>
        <input class="code-input" placeholder="Introduce el código" id="codeInput"/>
        <button class="button" id="searchButton">Buscar</button>
      </div>
    </div>
  </div>

  <script>
    // Ejemplo básico para que al pulsar "Buscar" aparezca info en la barra inferior
    const searchButton = document.getElementById('searchButton');
    const codeInput = document.getElementById('codeInput');
    const infoPanel = document.getElementById('infoPanel');

    searchButton.addEventListener('click', () => {
      const code = codeInput.value.trim();
      if(code) {
        infoPanel.innerHTML = `<p>Se ha buscado el código: <strong>${code}</strong></p>`;
      }
    });
  </script>
</body>
</html>
